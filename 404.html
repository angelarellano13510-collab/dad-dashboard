<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // SPA routing for GitHub Pages
    // Redirects to index.html while preserving the path
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      
      // Replace the current URL with index.html + path
      window.location.replace('/index.html' + path + search + hash);
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
